# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.schemas=tenant_auth
spring.flyway.default-schema=tenant_auth

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=tenant_auth

# JWT
jwt.secret=your-super-secret-key-that-is-at-least-256-bits-long-and-is-not-publicly-known
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html